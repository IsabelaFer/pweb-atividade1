            <br/>

                    <option value="13">Colômbia</option>

                    <option value="16">Croácia</option>
                    <option value="17">Curaçao</option>
                    <option value="18">Egito</option>

                    <option value="35">Panamá</option>

                    <option value="37">Portugal</option>
                    <option value="38">Senegal</option>
                    <option value="39">Suíça</option>
                    <option value="40">Tunísia</option>
                    <option value="41">Uruguai</option>
                    <option value="42">Uzbequistão</option>
                </optgroup>
            </select>
            <br/>

            <label for="qtdd">Quantidade:</label>
            <input 
                type="number" 
                id="qtdd" 
                min="1" 
                max="10"
                required
            /> 
            <br/>
        </fieldset>
